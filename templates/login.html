<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudPulse — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080c14;
    --surface: #0d1421;
    --border: #1a2540;
    --accent: #00e5ff;
    --accent2: #7b61ff;
    --text: #e8edf5;
    --muted: #4a5568;
    --error: #ff4d6d;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Glows */
  .glow-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    animation: pulse 6s ease-in-out infinite;
  }
  .glow-orb.one { width: 400px; height: 400px; background: rgba(0,229,255,0.07); top: -100px; right: -100px; }
  .glow-orb.two { width: 300px; height: 300px; background: rgba(123,97,255,0.08); bottom: -80px; left: -80px; animation-delay: 3s; }

  @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    position: relative;
    animation: slideUp 0.5s ease;
  }

  /* Accent corner lines */
  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
  }
  .card::before { top: -1px; left: -1px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
  .card::after { bottom: -1px; right: -1px; border-bottom: 2px solid var(--accent2); border-right: 2px solid var(--accent2); }

  @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .logo span { color: var(--muted); }

  h1 {
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 6px;
  }

  .subtitle {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 36px;
    letter-spacing: 1px;
  }

  .field { margin-bottom: 20px; }

  label {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  .error-msg {
    background: rgba(255,77,109,0.1);
    border: 1px solid rgba(255,77,109,0.3);
    border-radius: 2px;
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--error);
    margin-bottom: 20px;
    letter-spacing: 0.5px;
  }

  button[type="submit"] {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 2px;
    padding: 14px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 8px;
  }

  button[type="submit"]:hover { opacity: 0.9; transform: translateY(-1px); }
  button[type="submit"]:active { transform: translateY(0); }

  .footer-link {
    text-align: center;
    margin-top: 28px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .footer-link a { color: var(--accent); text-decoration: none; }
  .footer-link a:hover { text-decoration: underline; }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 32px;
  }

  .status-dot {
    width: 6px; height: 6px;
    background: #00ff88;
    border-radius: 50%;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .status-text {
    font-family: var(--mono);
    font-size: 10px;
    color: #00ff88;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="glow-orb one"></div>
  <div class="glow-orb two"></div>

  <div class="card">
    <div class="logo">Cloud<span>//</span>Pulse</div>
    <h1>Sign In</h1>
    <p class="subtitle">// MONITORING PLATFORM v1.0</p>

    <div class="status-bar">
      <div class="status-dot"></div>
      <span class="status-text">ALL SYSTEMS OPERATIONAL</span>
    </div>

    {% if error %}
    <div class="error-msg">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" placeholder="your_username" required autocomplete="off">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit">Access Dashboard →</button>
    </form>

    <div class="footer-link">
      No account? <a href="/register">Register here</a>
    </div>
  </div>
</body>
</html>
